name: Duty Reminder

on:
  # cron-job.org에서 workflow_dispatch로 트리거 (duty1: 17:50 KST, duty2: 08:10 KST)
  workflow_dispatch:
    inputs:
      mode:
        description: 'duty1, duty2, or test'
        required: true
        default: 'test'

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: scripts

      - name: Run reminder
        run: node duty-reminder.mjs ${{ github.event.inputs.mode }}
        working-directory: scripts
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
