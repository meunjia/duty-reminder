name: Duty Reminder

on:
  repository_dispatch:
    types: [duty1, duty2, test]
  workflow_dispatch:
    inputs:
      mode:
        description: 'duty1, duty2, or test'
        required: true
        default: 'test'

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: scripts

      - name: Run reminder
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            node duty-reminder.mjs ${{ github.event.action }}
          else
            node duty-reminder.mjs ${{ github.event.inputs.mode }}
          fi
        working-directory: scripts
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
