name: Duty Reminder

on:
  schedule:
    - cron: '50 8 * * *'   # duty1: 17:50 KST (08:50 UTC)
    - cron: '10 23 * * *'  # duty2: 08:10 KST (23:10 UTC 전날)
  workflow_dispatch:
    inputs:
      mode:
        description: 'duty1, duty2, or test'
        required: true
        default: 'test'

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: scripts

      - name: Run reminder
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            if [ "${{ github.event.schedule }}" = "50 8 * * *" ]; then
              node duty-reminder.mjs duty1
            else
              node duty-reminder.mjs duty2
            fi
          else
            node duty-reminder.mjs ${{ github.event.inputs.mode }}
          fi
        working-directory: scripts
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
